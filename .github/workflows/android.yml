name: Android CI

on:
  push:
    branches: [ "main", "master" ] # 当主分支有变动时触发
  workflow_dispatch: # 允许你手动点击按钮触发编译

jobs:
  build:
    runs-on: ubuntu-latest # 使用 GitHub 提供的 Linux 虚拟服务器

    steps:
    - uses: actions/checkout@v4 # 拉取代码

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug # 编译 Debug 版 APK

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-app-apk
        path: app/build/outputs/apk/debug/*.apk # 这里的路径根据项目结构可能略有不同
