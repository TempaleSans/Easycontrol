name: 打包EasyControl APK
on:
  push:
    # 替换为仓库实际默认分支（main/master）
    branches: [ main ]
    paths: [ 'easycontrol/**' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      # 修复点1：降级为JDK 11，适配多数Android项目
      - name: 配置JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
          # 修复点2：移除cache-dependency-path，避免路径匹配错误
          cache: 'gradle'

      # 赋予权限：精准指向easycontrol下的gradlew
      - name: 赋予Gradle执行权限
        run: chmod +x easycontrol/gradlew

      # 构建：进入子目录执行，关闭守护进程提升稳定性
      - name: 构建Release版本APK
        run: cd easycontrol && ./gradlew assembleRelease --no-daemon --stacktrace

      # 上传产物：匹配子目录的打包路径
      - name: 上传APK产物
        uses: actions/upload-artifact@v4
        with:
          name: EasyControl-安装包
          path: easycontrol/app/build/outputs/apk/release/*.apk
