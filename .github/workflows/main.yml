name: 自动打包安卓APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码（确保获取完整仓库内容）
      - name: 拉取仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 设置 JDK 环境（适配 Android 构建）
      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle' # 缓存 Gradle 依赖，加速构建

      # 3. 赋予 gradlew 执行权限（核心修复：使用绝对路径风格，确保识别）
      - name: 赋予 Gradle 执行权限
        run: chmod +x gradlew

      # 4. 执行 Release 打包（根目录直接运行）
      - name: 构建 Release 版本 APK
        run: ./gradlew assembleRelease --no-daemon # 关闭守护进程，避免构建异常

      # 5. 上传产物（匹配原生 Android 打包路径）
      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: 安卓安装包
          path: app/build/outputs/apk/release/*.apk
