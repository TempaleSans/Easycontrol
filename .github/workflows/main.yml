name: 自动打包EasyControl APK
# 触发规则：适配默认分支（main/master），同时保留手动触发
on:
  push:
    # 替换为你的仓库实际默认分支（main 或 master）
    branches: [ main ]
    # 可选：仅当 easycontrol 目录下的文件变更时触发，减少无效构建
    paths:
      - 'easycontrol/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取完整代码
      - name: 拉取仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 配置 JDK 17（适配 Android 构建）
      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
          # 缓存依赖的路径指向 easycontrol 目录
          cache-dependency-path: 'easycontrol/build.gradle'

      # 3. 赋予 gradlew 权限（精准指向 easycontrol 目录下的脚本）
      - name: 赋予 Gradle 执行权限
        run: chmod +x easycontrol/gradlew

      # 4. 构建 Release APK（核心：进入 easycontrol 目录执行命令）
      - name: 构建 Release 版本
        # cd 进入子目录，再执行打包命令
        run: cd easycontrol && ./gradlew assembleRelease --no-daemon

      # 5. 上传 APK（适配子目录的打包产物路径）
      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: EasyControl安装包
          # 产物路径为 easycontrol 下的标准 Release 路径
          path: easycontrol/app/build/outputs/apk/release/*.apk

